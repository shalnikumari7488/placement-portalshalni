<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login | Placement Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}
html,body{
    height:100%;
}

/* ===== BACKGROUND ===== */
body{
    background:
        linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
        url("bg6.jpg") no-repeat center center/cover;
}

/* ===== HEADER ===== */
.header{
    background:rgba(44,47,90,0.95);
    display:flex;
    align-items:center;
    padding:14px 40px;
}
.logo img{
    width:55px;
}
.title{
    margin-left:15px;
}
.title h1{
    color:#fff;
    font-size:24px;
}
.title p{
    color:#dcdcff;
    font-size:14px;
}

/* NAVIGATION */
.nav{
    margin-left:auto;
}
.nav a{
    color:#fff;
    text-decoration:none;
    margin-left:18px;
    font-size:14px;
    font-weight:600;
}
.nav a:hover{
    color:#ffdf6c;
}

/* ===== MAIN AREA ===== */
.main{
    height:calc(100vh - 90px);
    display:flex;
    align-items:center;
    justify-content:center;
}

/* LOGIN BOX */
.login-box{
    background:rgba(255,255,255,0.97);
    padding:38px;
    width:380px;
    border-radius:16px;
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
    text-align:center;
}

/* TITLE */
.login-box h2{
    color:#2c2f5a;
    font-size:26px;
    margin-bottom:6px;
}
.login-subtitle{
    font-size:14px;
    color:#666;
    margin-bottom:18px;
}
.login-quote{
    font-size:13px;
    color:#777;
    margin-bottom:22px;
    font-style:italic;
}

/* FORM */
.login-box label{
    font-size:14px;
    color:#333;
    display:block;
    text-align:left;
}
.login-box input{
    width:100%;
    padding:11px;
    margin:8px 0 18px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}
.login-box button{
    width:100%;
    padding:12px;
    background:#5a5fcf;
    border:none;
    color:#fff;
    font-size:15px;
    font-weight:600;
    border-radius:8px;
    cursor:pointer;
}
.login-box button:hover{
    background:#3f44b5;
}

/* EXTRA TEXT */
.note{
    margin-top:18px;
    font-size:13px;
    color:#555;
}
.note a{
    color:#5a5fcf;
    text-decoration:none;
    font-weight:600;
}
.note a:hover{
    text-decoration:underline;
}

/* ===== FOOTER ===== */
.footer{
    position:absolute;
    bottom:0;
    width:100%;
    text-align:center;
    padding:10px;
    font-size:13px;
    background:rgba(255,255,255,0.85);
    color:#444;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <div class="logo">
        <img src="logo.jpg" alt="Ranchi Women's College Logo">
    </div>

    <div class="title">
        <h1>Ranchi Women's College</h1>
        <p>Placement Cell Management System</p>
    </div>

    <div class="nav">
        <a href="front.html">Home</a>
        <a href="studentlogin.html">Student Login</a>
        <a href="companylogin.html">Company Login</a>
        <a href="registration.html">Registration</a>
        <a href="adminlogin.html">Admin</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<!-- ===== MAIN ===== -->
<div class="main">
    <div class="login-box">

        <h2>Student Login</h2>
        <div class="login-subtitle">Access your placement dashboard</div>
        <div class="login-quote">
            "Step closer to your career opportunities"
        </div>

        <form action="studentlogin.php" method="get">
            <label>Email / Roll Number</label>
            <input type="text" name="nm1" placeholder="Enter registered email or roll no" required>

            <label>Password</label>
            <input type="password" name="nm2" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <div class="note">
            New student?
            <a href="placeholder.html">Register here</a>
        </div>

    </div>
</div>

<!-- ===== FOOTER ===== -->
<div class="footer">
    © 2025 Ranchi Women’s College | Placement Cell
</div>

</body>
</html>
